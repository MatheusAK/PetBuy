<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&display=swap" rel="stylesheet">
    <script src="../js/cadastro.js"></script>

    <link rel="stylesheet" href="../css/general.css">
    <link rel="stylesheet" href="../css/header.css">
    <link rel="stylesheet" href="../css/home.css">
    <link rel="stylesheet" href="../css/buttons.css">
    <title>Home</title>
</head>
<body>
    <header>
        <nav>
            <a href="home.html" id="navButton">Início</a>
            <a href="about.html" id="navButton">Sobre Nós</a>
            <a href="pets.html" id="navButton">Comprar um pet</a>
            <a href="contact.html" id="navButton">Contato</a>
            <a href="register.html" id="navButtonOn">Cadastro</a>
        </nav>
    </header>

    <div class="pageContent">
        <div class="apresentação">
            <h1>
                <span class="highlight">Cadastre-se</span> para conhecermos você!
            </h1>
            <p>
                Use nosso site para encontrar uma nova família para o seu pet! <br> <br> <br>
            </p>
            <div class="2buttons">
                <a href="pets.html" id="ButtonOn">Encontre um Pet</a>
                <a href="about.html" id="commonButton">Nossa História</a>
            </div>

            <br><br><hr>
        </div>
        <div class="imagemInicio">
            <h1>Cadastro</h1>
            <form>
                <label for="nome">Nome completo:</label><br>
                <input type="text" id="nome" name="nome" required><br><br>

                <label for="telefone">Telefone:</label><br>
                <input type="text" id="telefone" name="telefone" required><br><br>

                <label for="endereco">Endereço:</label><br>
                <input type="text" id="endereco" name="endereco" required><br><br>

                <label for="cpf">CPF:</label><br>
                <input type="text" id="cpf" name="cpf" required><br><br>

                <input type="button" value="Cadastrar" id="ButtonSubmit">
            </form>
            <h3 id="cadastroSucesso" style="display: none;">Cadastro realizado com sucesso!</h3>
        </div>
    </div>
</body>
</html>
